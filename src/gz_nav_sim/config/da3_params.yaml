da3_depth_node:
  ros__parameters:
    image_topic: /camera/image_raw
    camera_info_topic: /camera/camera_info
    depth_topic: /camera/depth/image_raw
    depth_camera_info_topic: /camera/depth/camera_info
    point_cloud_topic: /camera/depth/points

    # 입력 이미지는 optical frame 기준으로 받고,
    # DA3가 만든 3D 좌표는 로봇 카메라 링크(camera_frame) 기준으로 보냄
    camera_frame: camera_optical_frame
    point_cloud_frame: camera_frame

    # auto: cuda -> mps -> cpu 순으로 선택
    device: auto

    # ── ACCURACY 우선 streaming-light ─────────────────────────────────
    # DA3-LARGE-1.1: 1.6GB, multi-view 지원, VGGT-comparable 품질.
    # Lidar_scale로 metric 보정. NESTED-GIANT-LARGE는 VRAM 부담 + chunk 8 OOM 위험.
    model_id: depth-anything/DA3-LARGE-1.1
    da3_log_level: INFO

    # Streaming-light (정확도 우선):
    # - chunk 8 / overlap 4 (streaming 원본 50% 비율)
    # - process_res 518: detail ↑ (336 대비 2배, 벽 경계 뚜렷)
    # - 추론 시간 ~0.2s/chunk 예상 → 초당 5 chunk
    process_res: 504
    process_res_method: upper_bound_resize
    inference_rate_hz: 1.0
    input_views: 8
    keyframe_overlap: 1
    # 큐 최대 크기. chunk(8) + 다음 chunk buffer 여유
    image_buffer_maxlen: 12
    # saddle_balanced: streaming 원본 default, view geometry 균형잡음
    ref_view_strategy: saddle_balanced

    # keyframe filter 완화 — 2px로 더 낮춤. 정지 중에도 조명/texture 변화로
    # 2px 정도는 거의 항상 나옴 → buffer stall 방지 확실.
    keyframe_min_disparity: 10.0
    keyframe_max_buffer_age_s: 10.0   # 너무 오래된 frame은 버림

    # 라이다 보정 ON — DA3 metric은 일관성 있지만 절대 정확도 부족.
    # 매 batch fit + EMA smoothing (affine_smooth_alpha=0.3 기본)으로
    # batch jitter 흡수하면서 점진적 보정. 첫 batch s≈1.0이라 큰 충격 없음.
    scan_topic: /scan
    lidar_scale: true
    lidar_scale_min_points: 5

    # PointCloud2 downsample 및 유효 깊이 범위
    # max_depth는 라이다 effective range (10m × 1.1)와 동기 →
    # 라이다 검증 안 된 11m+ 외삽 영역이 nvblox/world cloud로 새는 거 차단
    point_cloud_stride: 2
    min_depth_m: 0.1
    max_depth_m: 11.0

    # 매 inference의 world-frame RGB pointcloud (단일 frame)
    # 누적 X — 매 inference마다 새 1장만 publish (FIFO replace)
    world_pointcloud_topic: /camera/depth/world_points
    world_frame: odom
    world_pc_voxel_size: 0.05     # voxel down-sample (0=비활성)

    # Radius outlier filter — KDTree 기반 isolated point 제거.
    # CPU contention 상황 (DA3 + nvblox 동시)에서 KDTree build/query가
    # chunk당 1~9초 잡아 chunk rate를 0.4 Hz 이하로 묶음.
    # 끔 → edge bleeding 점이 약간 늘 수 있지만 nvblox TSDF가 흡수 가능.
    # voxel down-sample (world_pc_voxel_size)과 z-score outlier가 일부 보완.
    outlier_filter_enable: false
