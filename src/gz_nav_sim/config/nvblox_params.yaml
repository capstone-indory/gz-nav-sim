/**:
  ros__parameters:
    # ── 프레임 설정 ─────────────────────────────────────────────────────
    # SLAM이 map→odom을 흔들어도 TSDF가 안 망가지게 odom 기준.
    global_frame: odom
    pose_frame: base_link
    use_tf_transforms: true

    # ── 입력 모드 (D456 RGB-D) ─────────────────────────────────────────
    use_depth: true
    use_color: true
    use_lidar: false

    # ── 맵 타입 ─────────────────────────────────────────────────────────
    # static_tsdf        : TSDF (mesh 추출 O) — 부드러운 표면 시각화
    # static_occupancy   : 3D occupancy voxel grid (mesh X) — "Minecraft 블록"
    # dynamic            : static TSDF + dynamic occupancy 둘 다
    mapping_type: "static_tsdf"

    # ── 해상도 ──────────────────────────────────────────────────────────
    # 큰 voxel일수록 mesh triangle 수가 8배수로 줄어 → Foxglove 부하 감소
    # 0.05 (5cm) → 0.10 (10cm)면 mesh 데이터량 1/8
    voxel_size: 0.04

    # ── ESDF (navigation용) ────────────────────────────────────────────
    compute_esdf: true
    esdf_update_rate_hz: 2.0
    esdf_2d: true
    publish_esdf_distance_slice: true
    esdf_slice_height: 0.5
    esdf_2d_min_height: 0.1
    esdf_2d_max_height: 1.5

    # ── Mesh ─────────────────────────────────────────────────────────────
    compute_mesh: true
    # mesh_marker는 매번 전체 mesh 송신 → 빈도 낮춰서 Foxglove 부하 줄임
    # 0.5 = 2초당 1번. 탐사 속도 느리면 충분.
    mesh_update_rate_hz: 0.2

    # ── Update rates ────────────────────────────────────────────────────
    # D456 native depth is lighter than feed-forward depth, but keep a modest
    # cap to avoid overloading Foxglove/nvblox while mapping.
    max_depth_update_hz: 5.0
    max_color_update_hz: 5.0

    # ── 입력 큐 ──────────────────────────────────────────────────────────
    max_poll_rate_hz: 100.0
    maximum_sensor_message_queue_length: 30

    # ── QoS ─────────────────────────────────────────────────────────────
    # Gazebo camera and nvblox bridge both work with system default QoS here.
    depth_qos: "SYSTEM_DEFAULT"
    color_qos: "SYSTEM_DEFAULT"

    # ── RViz 시각화 ─────────────────────────────────────────────────────
    slice_visualization_attachment_frame_id: "base_link"
    slice_visualization_side_length: 20.0

    static_mapper:
      # ── Depth preprocessing ──────────────────────────────────────────
      do_depth_preprocessing: false

      # ── Integrator — D456 max range에 맞춘 보수값 ───────────────────
      projective_integrator_max_integration_distance_m: 20.0
      # truncation 6.0 복구: 얇게 하면 mesh가 끊어져서 안 생김.
      projective_integrator_truncation_distance_vox: 6.0
      weighting_mode: "inverse_square_tsdf_distance_penalty"
      # max_weight 3.0 복구: 너무 공격적으로 덮어쓰면 노이즈도 그대로 반영.
      projective_integrator_max_weight: 3.0

      # ── ESDF integrator ───────────────────────────────────────────────
      esdf_integrator_min_weight: 0.0001
      esdf_integrator_max_site_distance_vox: 5.0
      esdf_integrator_max_distance_m: 2.0

      # ── Mesh integrator ──────────────────────────────────────────────
      mesh_integrator_min_weight: 0.0001
      mesh_integrator_weld_vertices: true

      # ── TSDF decay (오래된 관측 약화 — 시간축 보정) ────────────────
      # 0.85 복구: 감쇠 너무 공격적이면 진짜 벽도 fade out.
      tsdf_decay_factor: 0.85

      # ════════════════════════════════════════════════════════════════
      # Option B (static_occupancy) — 우선 nvblox 기본값으로 테스트.
      # "벽 2줄" 재발 시 아래 주석 해제해서 공격적 값 적용 가능.
      # ════════════════════════════════════════════════════════════════
      # free_region_occupancy_probability: 0.25
      # occupied_region_occupancy_probability: 0.75
      # unobserved_region_occupancy_probability: 0.5
      # occupied_region_half_width_m: 0.20
      # max_tsdf_distance_for_occupancy_m: 0.3
      # occupied_region_decay_probability: 0.50
      # free_region_decay_probability: 0.50
      # min_consecutive_occupancy_duration_for_reset_ms: 2000
      # max_unobserved_to_keep_consecutive_occupancy_ms: 3000
      # min_duration_since_occupied_for_freespace_ms: 4000
