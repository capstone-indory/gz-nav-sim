/**:
  ros__parameters:
    # ── 프레임 설정 ─────────────────────────────────────────────────────
    # SLAM이 map→odom을 흔들어도 TSDF가 안 망가지게 odom 기준.
    global_frame: odom
    pose_frame: base_link
    use_tf_transforms: true

    # ── 입력 모드 (DA3 depth + Gazebo RGB) ──────────────────────────────
    use_depth: true
    use_color: true
    use_lidar: false

    # ── 맵 타입 ─────────────────────────────────────────────────────────
    # static_tsdf: mesh 위주
    # static_occupancy: 2D 내비 위주
    mapping_type: "static_tsdf"

    # ── 해상도 ──────────────────────────────────────────────────────────
    # 큰 voxel일수록 mesh triangle 수가 8배수로 줄어 → Foxglove 부하 감소
    # 0.05 (5cm) → 0.10 (10cm)면 mesh 데이터량 1/8
    voxel_size: 0.05

    # ── ESDF (navigation용) ────────────────────────────────────────────
    compute_esdf: true
    esdf_update_rate_hz: 2.0
    esdf_2d: true
    publish_esdf_distance_slice: true
    esdf_slice_height: 0.5
    esdf_2d_min_height: 0.1
    esdf_2d_max_height: 1.5

    # ── Mesh ─────────────────────────────────────────────────────────────
    compute_mesh: true
    # mesh_marker는 매번 전체 mesh 송신 → 빈도 낮춰서 Foxglove 부하 줄임
    # 0.5 = 2초당 1번. 탐사 속도 느리면 충분.
    mesh_update_rate_hz: 0.2

    # ── Update rates ────────────────────────────────────────────────────
    # DA3는 2Hz 추론이므로 depth rate도 그 수준.
    max_depth_update_hz: 5.0
    max_color_update_hz: 5.0

    # ── 입력 큐 ──────────────────────────────────────────────────────────
    max_poll_rate_hz: 100.0
    maximum_sensor_message_queue_length: 30

    # ── Map clearing ────────────────────────────────────────────────────
    # 로봇 주변 반경 외 mesh 잘라냄 → mesh 데이터량 (r/10)³로 감소
    # 5m면 mesh 크기 1/8. 더 크게 보고 싶으면 키우되 ws 부하 증가.
    map_clearing_radius_m: 5.0
    map_clearing_frame_id: "base_link"
    clear_outside_radius_rate_hz: 1.0

    # ── QoS ─────────────────────────────────────────────────────────────
    # DA3 노드가 RELIABLE로 내므로 매칭.
    depth_qos: "SYSTEM_DEFAULT"
    color_qos: "SYSTEM_DEFAULT"

    # ── RViz 시각화 ─────────────────────────────────────────────────────
    slice_visualization_attachment_frame_id: "base_link"
    slice_visualization_side_length: 20.0

    static_mapper:
      # ── Depth preprocessing (DA3는 이미 부드러움 → off) ──────────────
      do_depth_preprocessing: false

      # ── Integrator — DA3 max range에 맞춘 보수값 ─────────────────────
      projective_integrator_max_integration_distance_m: 8.0
      projective_integrator_truncation_distance_vox: 4.0
      weighting_mode: "inverse_square_tsdf_distance_penalty"
      projective_integrator_max_weight: 5.0

      # ── ESDF integrator ───────────────────────────────────────────────
      esdf_integrator_min_weight: 0.0001
      esdf_integrator_max_site_distance_vox: 5.0
      esdf_integrator_max_distance_m: 2.0

      # ── Mesh integrator ──────────────────────────────────────────────
      mesh_integrator_min_weight: 0.0001
      mesh_integrator_weld_vertices: true

      # ── TSDF decay (오래된 관측 약화 — 시간축 보정) ────────────────
      tsdf_decay_factor: 0.95
